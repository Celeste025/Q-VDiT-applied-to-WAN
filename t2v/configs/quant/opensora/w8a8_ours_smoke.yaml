part_fp_list: "./t2v/configs/quant/opensora/remain_fp.txt"
model:
    model_id: "opensora"
    model_type: 'opensora'
conditional: True
cfg_split: True
calib_data:
    path: "your path of calib data"
    n_steps: 20
    batch_size: 1
    n_samples: 2
quant:
    weight:
        optimization:
            joint_weight_act_opt: False
            use_grad: False
            iters: 50
            loss:
                lambda_coeff: 0.5
                warmup: 0.0
                reconstruction_loss_type: 'relation'
            params:
                delta:
                    lr: 1.e-6
        quantizer:
            n_bits: 8
            per_group: 'channel'
            scale_method: 'grid_search_lp'
            channel_wise: True
            round_mode: 'nearest_ste'
            sym: False
    activation:
        optimization:
            joint_weight_act_opt: False
            use_grad: False
            iters: 10
            loss:
                lambda_coeff: 0.5
                warmup: 0.0
            params: {}
        quantizer:
            n_bits: 8
            per_group: 'token'
            dynamic: True
            scale_method: 'min_max'
            round_mode: 'nearest_ste'
            running_stat: False
            sym: False
            n_spatial_token: 1024
            n_temporal_token: 16
            n_prompt: 120
            smooth_quant:
                enable: False
                channel_wise_scale_type: momentum_act_max
                momentum: 0.95
                alpha: 0.625
    grad_checkpoint: False
resume_with_w_quantized:
    path: None
